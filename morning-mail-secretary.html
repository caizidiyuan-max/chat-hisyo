<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>朝9時メール秘書</title>
  <style>
    :root{--ink:#17211e;--muted:#68756f;--forest:#173f35;--bg:#eef2ec;--paper:#fff;--line:#d7e0da}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;color:var(--ink);background:radial-gradient(circle at 85% 8%,#d8e9df 0,transparent 30rem),var(--bg);font-family:Arial,"Yu Gothic",sans-serif}
    main{width:min(560px,100%);padding:34px;border:1px solid var(--line);border-radius:28px;background:#ffffffeb;box-shadow:0 20px 60px #193d3020;text-align:center}
    .mark{width:62px;height:62px;margin:0 auto 18px;display:grid;place-items:center;border-radius:21px;background:var(--forest);color:#fff;font-size:30px}small{font-size:10px;letter-spacing:.18em;font-weight:900;color:#809087}h1{margin:8px 0 10px;font-size:clamp(27px,7vw,39px);letter-spacing:-.04em}p{margin:0 auto 22px;max-width:420px;color:var(--muted);font-size:14px;line-height:1.8}a{min-height:54px;padding:0 24px;display:inline-flex;align-items:center;justify-content:center;border-radius:15px;background:var(--forest);color:#fff;text-decoration:none;font-weight:900;font-size:15px}footer{margin-top:20px;padding-top:17px;border-top:1px solid var(--line);color:#86928d;font-size:11px;line-height:1.7}
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">✉</div>
    <small>MORNING DESK</small>
    <h1>朝9時メール秘書</h1>
    <p>下のボタンを押すと、メール秘書を新しい画面で開きます。</p>
    <a href="https://morning-mail-secretary.caizidiyuan.chatgpt.site" target="_blank" rel="noopener noreferrer">メール秘書を開く</a>
    <footer>Gmail連携・データ保存・5分ごとの自動化は、公開中のアプリ側で安全に処理します。</footer>
  </main>
</body>
</html>
